<!DOCTYPE html>
<html>
<head>
    <title>Form Validation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 400px;
            margin: 50px auto;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        #strength {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Login Form</h2>

    <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username">

        <label>Email</label>
        <input type="text" id="email">

        <label>Password</label>
        <input type="password" id="password">

        <p id="strength"></p>

        <button type="submit">Login</button>
    </form>

    <p id="message"></p>

    <script src="script.js"></script>

</body>
</html>
